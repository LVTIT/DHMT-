<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Capture - 3D Skeleton Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        /* HUD overlay - top left */
        #hud {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            pointer-events: none;
        }
        #hud h1 {
            font-size: 20px;
            font-weight: 700;
            color: #00ccff;
            margin-bottom: 6px;
            text-shadow: 0 0 12px rgba(0, 204, 255, 0.4);
            letter-spacing: 0.5px;
        }
        #hud .subtitle {
            font-size: 11px;
            color: #556;
            margin-bottom: 10px;
        }
        #status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        #status.connected {
            background: rgba(0, 255, 100, 0.12);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.25);
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.1);
        }
        #status.disconnected {
            background: rgba(255, 60, 60, 0.12);
            color: #ff3c3c;
            border: 1px solid rgba(255, 60, 60, 0.25);
            animation: pulse 1.5s ease-in-out infinite;
        }
        #status.connecting {
            background: rgba(255, 200, 0, 0.12);
            color: #ffc800;
            border: 1px solid rgba(255, 200, 0, 0.25);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        #fps-counter {
            font-size: 11px;
            color: #556;
            margin-top: 8px;
        }
        /* Angles panel - top right */
        #angles-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            background: rgba(10, 10, 30, 0.88);
            border: 1px solid rgba(0, 204, 255, 0.15);
            border-radius: 10px;
            padding: 14px 18px;
            min-width: 220px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        #angles-panel h3 {
            font-size: 11px;
            color: #00ccff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .angle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .angle-row:last-child { border-bottom: none; }
        .angle-name {
            color: #889;
            font-weight: 400;
            text-transform: capitalize;
        }
        .angle-value {
            color: #00ff96;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-size: 13px;
        }
        /* Footer */
        #footer {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #334;
            z-index: 10;
            background: rgba(10, 10, 30, 0.6);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <!-- HUD -->
        <div id="hud">
            <h1>3D Skeleton Viewer</h1>
            <div class="subtitle">Human Motion Capture</div>
            <div id="status" class="disconnected">&#x25CF; Disconnected</div>
            <div id="fps-counter">FPS: --</div>
        </div>

        <!-- Angles panel -->
        <div id="angles-panel">
            <h3>Joint Angles</h3>
            <div id="angles-list">
                <div class="angle-row"><span class="angle-name">Waiting for data...</span></div>
            </div>
        </div>

        <div id="footer">Mouse: rotate &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Right-click: pan</div>
    </div>

    <!-- Three.js from CDN (ES module) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // =================================================================
    // Scene Setup
    // =================================================================
    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.3);

    const camera = new THREE.PerspectiveCamera(
        50, window.innerWidth / window.innerHeight, 0.01, 100
    );
    camera.position.set(0, 0.2, 2.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 0, 0);
    controls.minDistance = 0.5;
    controls.maxDistance = 10;

    // Lights
    scene.add(new THREE.AmbientLight(0x303050, 2.0));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(3, 5, 4);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0x00ccff, 0.4);
    rimLight.position.set(-2, 1, -3);
    scene.add(rimLight);

    const pointLight = new THREE.PointLight(0x00ccff, 0.6, 8);
    pointLight.position.set(-1, 1.5, 2);
    scene.add(pointLight);

    // Ground plane with grid
    const groundGeo = new THREE.PlaneGeometry(6, 6);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a1a,
        roughness: 0.9,
        metalness: 0.0,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(6, 30, 0x1a1a3e, 0x0f0f28);
    grid.position.y = -0.999;
    scene.add(grid);

    // =================================================================
    // Skeleton Configuration
    // =================================================================
    const SEGMENT_GROUPS = {
        torso:     { pairs: [[11,12],[11,23],[12,24],[23,24]], color: 0xdddddd },
        left_arm:  { pairs: [[11,13],[13,15]],                color: 0x00bbff },
        right_arm: { pairs: [[12,14],[14,16]],                color: 0x00bbff },
        left_leg:  { pairs: [[23,25],[25,27],[27,29],[27,31]], color: 0xff4466 },
        right_leg: { pairs: [[24,26],[26,28],[28,30],[28,32]], color: 0xff4466 },
        face:      { pairs: [[0,11],[0,12]],                  color: 0x666688 },
    };

    const KEY_JOINTS = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

    // =================================================================
    // Skeleton 3D Objects - Spheres for joints, cylinders for bones
    // =================================================================
    const jointGroup = new THREE.Group();
    scene.add(jointGroup);
    const boneGroup = new THREE.Group();
    scene.add(boneGroup);

    // Joint spheres
    const jointMeshes = [];
    const jointGeo = new THREE.SphereGeometry(0.018, 16, 16);
    const jointMat = new THREE.MeshPhongMaterial({
        color: 0xffcc00,
        emissive: 0x664400,
        shininess: 100,
        specular: 0xffffff,
    });

    for (let i = 0; i < KEY_JOINTS.length; i++) {
        const mesh = new THREE.Mesh(jointGeo, jointMat);
        mesh.visible = false;
        mesh.castShadow = true;
        jointGroup.add(mesh);
        jointMeshes.push(mesh);
    }

    // Bone cylinders (dynamically positioned between joints)
    const boneCylinders = [];
    const cylGeo = new THREE.CylinderGeometry(0.006, 0.006, 1, 8);
    // Shift geometry so bottom is at origin (makes positioning easier)
    cylGeo.translate(0, 0.5, 0);

    for (const [groupName, group] of Object.entries(SEGMENT_GROUPS)) {
        for (const [i1, i2] of group.pairs) {
            const mat = new THREE.MeshPhongMaterial({
                color: group.color,
                emissive: new THREE.Color(group.color).multiplyScalar(0.15),
                shininess: 60,
            });
            const cyl = new THREE.Mesh(cylGeo.clone(), mat);
            cyl.visible = false;
            cyl.castShadow = true;
            cyl.userData = { i1, i2 };
            boneGroup.add(cyl);
            boneCylinders.push(cyl);
        }
    }

    // =================================================================
    // Coordinate transform: MediaPipe -> Three.js
    // MediaPipe: X=right, Y=down, Z=away
    // Three.js:  X=right, Y=up,   Z=toward
    // =================================================================
    function transformLM(lm) {
        return new THREE.Vector3(lm[0], -lm[1], -lm[2]);
    }

    // Temp vectors to avoid GC pressure
    const _v1 = new THREE.Vector3();
    const _v2 = new THREE.Vector3();
    const _dir = new THREE.Vector3();
    const _up = new THREE.Vector3(0, 1, 0);
    const _quat = new THREE.Quaternion();

    // =================================================================
    // Update skeleton from data
    // =================================================================
    function updateSkeleton(data) {
        if (!data.landmarks) {
            jointMeshes.forEach(m => m.visible = false);
            boneCylinders.forEach(m => m.visible = false);
            return;
        }

        const lms = data.landmarks.map(transformLM);

        // Update joints
        for (let i = 0; i < KEY_JOINTS.length; i++) {
            const idx = KEY_JOINTS[i];
            if (idx < lms.length) {
                jointMeshes[i].position.copy(lms[idx]);
                jointMeshes[i].visible = true;
            }
        }

        // Update bone cylinders
        for (const cyl of boneCylinders) {
            const { i1, i2 } = cyl.userData;
            if (i1 < lms.length && i2 < lms.length) {
                _v1.copy(lms[i1]);
                _v2.copy(lms[i2]);
                _dir.subVectors(_v2, _v1);
                const len = _dir.length();

                if (len > 0.001) {
                    cyl.position.copy(_v1);
                    cyl.scale.set(1, len, 1);
                    _dir.normalize();
                    _quat.setFromUnitVectors(_up, _dir);
                    cyl.quaternion.copy(_quat);
                    cyl.visible = true;
                } else {
                    cyl.visible = false;
                }
            }
        }

        // Update angles panel
        if (data.angles) {
            updateAnglesPanel(data.angles);
        }
    }

    // =================================================================
    // Angles Panel
    // =================================================================
    function updateAnglesPanel(angles) {
        const list = document.getElementById('angles-list');
        if (!angles || Object.keys(angles).length === 0) {
            list.innerHTML = '<div class="angle-row"><span class="angle-name">No angles</span></div>';
            return;
        }
        let html = '';
        for (const key of Object.keys(angles).sort()) {
            const val = angles[key].toFixed(1);
            const label = key.replace(/_/g, ' ').toLowerCase();
            html += `<div class="angle-row">
                <span class="angle-name">${label}</span>
                <span class="angle-value">${val}&deg;</span>
            </div>`;
        }
        list.innerHTML = html;
    }

    // =================================================================
    // WebSocket with auto-reconnect
    // =================================================================
    const WS_URL = `ws://${window.location.host}/ws`;
    let ws = null;
    let reconnectTimer = null;

    // FPS tracking
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let displayFps = 0;

    function setStatus(state, text) {
        const el = document.getElementById('status');
        el.className = state;
        el.textContent = text;
    }

    function connectWebSocket() {
        setStatus('connecting', '\u25CF Connecting...');

        try {
            ws = new WebSocket(WS_URL);
        } catch (e) {
            scheduleReconnect();
            return;
        }

        ws.onopen = () => {
            setStatus('connected', '\u25CF Connected');
            frameCount = 0;
            lastFpsTime = performance.now();
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                updateSkeleton(data);
                frameCount++;

                // Update FPS display every second
                const now = performance.now();
                if (now - lastFpsTime >= 1000) {
                    displayFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
                    document.getElementById('fps-counter').textContent = `FPS: ${displayFps}`;
                    frameCount = 0;
                    lastFpsTime = now;
                }
            } catch (e) {
                console.error('Parse error:', e);
            }
        };

        ws.onclose = () => {
            setStatus('disconnected', '\u25CF Disconnected');
            document.getElementById('fps-counter').textContent = 'FPS: --';
            scheduleReconnect();
        };

        ws.onerror = () => {
            ws.close();
        };
    }

    function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            connectWebSocket();
        }, 2000);
    }

    // =================================================================
    // Render loop
    // =================================================================
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // =================================================================
    // Resize
    // =================================================================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // =================================================================
    // Start
    // =================================================================
    animate();
    connectWebSocket();
    </script>
</body>
</html>
