<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Motion Capture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

        * { box-sizing: border-box; }
        :root {
            --bg: #111315;
            --panel: rgba(20, 22, 24, 0.82);
            --line: rgba(255, 255, 255, 0.13);
            --text: #f3efe4;
            --muted: #a4aaa2;
            --teal: #50d2c2;
            --coral: #ff8068;
            --amber: #f4bd4f;
            --green: #8bd45f;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 30% 10%, #202629 0, #111315 46%, #0b0d0f 100%);
            color: var(--text);
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: 0;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .hud {
            position: absolute;
            z-index: 12;
            color: var(--text);
            backdrop-filter: blur(14px);
        }
        .topbar {
            top: 14px;
            left: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            pointer-events: none;
        }
        .brand {
            min-width: 220px;
        }
        h1 {
            margin: 0;
            font-size: 18px;
            line-height: 1;
            font-weight: 700;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
        }
        #status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--coral);
            box-shadow: 0 0 16px rgba(255, 128, 104, 0.75);
        }
        #status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 16px rgba(139, 212, 95, 0.75);
        }
        #status-dot.connecting {
            background: var(--amber);
            box-shadow: 0 0 16px rgba(244, 189, 79, 0.75);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(74px, auto));
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 8px;
            pointer-events: auto;
        }
        .stat {
            min-width: 72px;
            border-left: 2px solid var(--teal);
            padding-left: 8px;
        }
        .stat span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.2;
        }
        .stat strong {
            display: block;
            margin-top: 2px;
            font-family: "IBM Plex Mono", monospace;
            font-size: 13px;
            color: var(--text);
        }
        #inspector {
            top: 92px;
            right: 14px;
            width: min(320px, calc(100vw - 28px));
            max-height: calc(100vh - 178px);
            overflow: auto;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }
        #inspector h2 {
            margin: 0 0 8px;
            font-size: 12px;
            color: var(--amber);
            font-weight: 700;
        }
        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            font-size: 12px;
        }
        .row:last-child { border-bottom: 0; }
        .label {
            color: var(--muted);
            text-transform: capitalize;
        }
        .value {
            font-family: "IBM Plex Mono", monospace;
            color: var(--teal);
            text-align: right;
        }
        .toolbar {
            left: 14px;
            bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            pointer-events: auto;
        }
        .source-box {
            display: flex;
            align-items: center;
            gap: 6px;
            border-right: 1px solid var(--line);
            padding-right: 8px;
        }
        input[type="number"] {
            width: 54px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-family: "IBM Plex Mono", monospace;
            padding: 0 8px;
        }
        button {
            display: grid;
            place-items: center;
            width: 36px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
        }
        button:hover,
        button.active {
            border-color: var(--teal);
            color: var(--teal);
            background: rgba(80, 210, 194, 0.1);
        }
        button svg {
            width: 18px;
            height: 18px;
            stroke-width: 2.2;
        }
        #video-overlay {
            position: absolute;
            left: 14px;
            top: 92px;
            z-index: 11;
            width: min(360px, calc(100vw - 28px));
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #08090a;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }
        .hidden { display: none !important; }
        #toast {
            position: absolute;
            z-index: 20;
            left: 50%;
            bottom: 72px;
            transform: translateX(-50%);
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--text);
            font-size: 12px;
            opacity: 0;
            transition: opacity 160ms ease;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }
        @media (max-width: 820px) {
            .topbar {
                align-items: flex-start;
            }
            .stats {
                grid-template-columns: repeat(2, minmax(72px, 1fr));
            }
            #inspector {
                top: auto;
                right: 10px;
                bottom: 66px;
                max-height: 34vh;
            }
            #video-overlay {
                top: 142px;
                left: 10px;
                width: min(270px, calc(100vw - 20px));
            }
            .toolbar {
                left: 10px;
                right: 10px;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <main id="canvas-container"></main>

    <section class="hud topbar">
        <div class="brand">
            <h1>Human Motion Capture</h1>
            <div class="status">
                <span id="status-dot"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat"><span>Stream FPS</span><strong id="stream-fps">--</strong></div>
            <div class="stat"><span>Backend FPS</span><strong id="backend-fps">--</strong></div>
            <div class="stat"><span>Gesture</span><strong id="gesture-label">--</strong></div>
            <div class="stat"><span>Confidence</span><strong id="gesture-confidence">--</strong></div>
        </div>
    </section>

    <img id="video-overlay" src="/video_feed" alt="OpenCV skeleton overlay">

    <aside id="inspector" class="hud">
        <h2>Joint Angles</h2>
        <div id="angles-list">
            <div class="row"><span class="label">waiting</span><span class="value">--</span></div>
        </div>
        <h2 style="margin-top: 14px;">Kinematics</h2>
        <div id="metadata-list">
            <div class="row"><span class="label">fk chains</span><span class="value">0</span></div>
            <div class="row"><span class="label">ik solver</span><span class="value">FABRIK</span></div>
        </div>
    </aside>

    <nav class="hud toolbar">
        <div class="source-box">
            <input id="camera-input" type="number" min="0" value="0" title="Camera index">
            <button id="source-button" title="Use webcam"><i data-lucide="webcam"></i></button>
            <button id="upload-button" title="Upload video"><i data-lucide="upload"></i></button>
            <input id="upload-input" class="hidden" type="file" accept="video/*">
        </div>
        <button id="pause-button" title="Pause or resume"><i data-lucide="pause"></i></button>
        <button class="active" data-toggle="video" title="2D overlay"><i data-lucide="picture-in-picture-2"></i></button>
        <button class="active" data-toggle="skeleton" title="3D skeleton"><i data-lucide="git-branch"></i></button>
        <button class="active" data-toggle="humanoid" title="Humanoid mesh"><i data-lucide="person-standing"></i></button>
        <button data-toggle="ik" title="IK overlay"><i data-lucide="route"></i></button>
        <button class="active" data-toggle="grid" title="Grid"><i data-lucide="grid-3x3"></i></button>
        <button class="active" data-toggle="center" title="Hip center"><i data-lucide="crosshair"></i></button>
        <button id="reset-camera" title="Reset camera"><i data-lucide="rotate-ccw"></i></button>
    </nav>

    <div id="toast"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script type="module">
        import { SkeletonRenderer } from '/static/skeleton_renderer.js';
        import { PoseWebSocket } from '/static/websocket_client.js';
        import { initControls } from '/static/controls.js';

        const renderer = new SkeletonRenderer(document.getElementById('canvas-container'));
        const toast = document.getElementById('toast');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
        }

        function setStatus({ state, text }) {
            statusDot.className = state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : '';
            statusText.textContent = text;
        }

        function updateHud(payload) {
            renderer.update(payload);
            const gesture = payload.gesture || {};
            document.getElementById('backend-fps').textContent =
                payload.metadata?.fps ? payload.metadata.fps.toFixed(1) : '--';
            document.getElementById('gesture-label').textContent = gesture.label || '--';
            document.getElementById('gesture-confidence').textContent =
                Number.isFinite(gesture.confidence) ? gesture.confidence.toFixed(2) : '--';
            updateAngles(payload.angles || {});
            updateMetadata(payload);
        }

        function updateAngles(angles) {
            const list = document.getElementById('angles-list');
            const keys = Object.keys(angles).sort();
            if (!keys.length) {
                list.innerHTML = '<div class="row"><span class="label">no angles</span><span class="value">--</span></div>';
                return;
            }
            list.innerHTML = keys.map((key) => {
                const label = key.replaceAll('_', ' ').toLowerCase();
                return `<div class="row"><span class="label">${label}</span><span class="value">${angles[key].toFixed(1)} deg</span></div>`;
            }).join('');
        }

        function updateMetadata(payload) {
            const metadata = payload.metadata || {};
            const fkCount = metadata.fk ? Object.keys(metadata.fk).length : 0;
            const boneCount = metadata.bone_lengths ? Object.keys(metadata.bone_lengths).length : 0;
            const ikError = metadata.ik_demo?.left_arm?.end_error;
            document.getElementById('metadata-list').innerHTML = `
                <div class="row"><span class="label">fk chains</span><span class="value">${fkCount}</span></div>
                <div class="row"><span class="label">bones</span><span class="value">${boneCount}</span></div>
                <div class="row"><span class="label">ik solver</span><span class="value">FABRIK</span></div>
                <div class="row"><span class="label">left ik error</span><span class="value">${Number.isFinite(ikError) ? ikError.toFixed(4) : '--'}</span></div>
                <div class="row"><span class="label">source</span><span class="value">${metadata.source || '--'}</span></div>
            `;
        }

        const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/pose`;
        const client = new PoseWebSocket({
            url: wsUrl,
            onStatus: setStatus,
            onMessage: updateHud,
            onFps: (fps) => {
                document.getElementById('stream-fps').textContent = String(fps);
            },
        });

        initControls(renderer, { onControl: showToast });
        window.lucide?.createIcons();
        client.connect();
    </script>
</body>
</html>
